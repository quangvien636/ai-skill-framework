schema_version: "1.0.0"
id: "runtime:primary"
name: "primary"
display_name: "Primary Runtime"
description: "Primary runtime"
version: "1.0.0"
status: "active"
owners: ["me"]
responsibility: "Primary runtime binding"
execution_profile: "sync"
model:
  enabled: true
  provider: "anthropic"
  model: "claude-sonnet-5"
retriever:
  enabled: true
  knowledge:
    - id: "kb:technical:writing:summarization:brevity"
      version: "1.0.0"
      required: true
      purpose: "Summarization guidance"
tools:
  enabled: true
  refs:
    - id: "tool:read-file"
      version: "1.0.0"
      required: true
publisher:
  enabled: false
timeout_policy:
  timeout_seconds: 30
  on_timeout: "fallback"
retry_policy:
  max_attempts: 1
  backoff: "none"
safety_profile:
  content_filter: "standard"
audit_profile:
  log_level: "basic"
concurrency_profile:
  max_parallel_steps: 1
  max_parallel_tool_calls: 1
fallback_profile:
  enabled: true
  fallback_runtime:
    id: "runtime:fallback-target"
    version: "1.0.0"
    required: true
  max_fallback_depth: 1
