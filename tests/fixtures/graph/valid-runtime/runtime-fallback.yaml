schema_version: "1.0.0"
id: "runtime:fallback-target"
name: "fallback-target"
display_name: "Fallback Target Runtime"
description: "Fallback target runtime"
version: "1.0.0"
status: "active"
owners: ["me"]
responsibility: "Fallback runtime binding"
execution_profile: "sync"
