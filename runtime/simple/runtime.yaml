schema_version: "1.0.0"
id: "runtime:simple"
name: "simple"
display_name: "Simple Runtime"
description: "Minimal single-model runtime with no retriever, tools, or publisher."
version: "1.0.0"
status: "draft"
owners: ["framework-maintainers"]
tags: ["runtime", "simple"]
responsibility: "Bind a Skill to a single model with conservative operational policy."
execution_profile: "sync"
model:
  enabled: true
  provider: "anthropic"
  model: "claude-sonnet-5"
  parameters:
    temperature: 0.2
retriever:
  enabled: false
  knowledge: []
tools:
  enabled: false
  refs: []
publisher:
  enabled: false
timeout_policy:
  timeout_seconds: 30
  on_timeout: "fail"
retry_policy:
  max_attempts: 1
  backoff: "none"
safety_profile:
  content_filter: "standard"
audit_profile:
  log_level: "basic"
concurrency_profile:
  max_parallel_steps: 1
  max_parallel_tool_calls: 1
fallback_profile:
  enabled: false
  max_fallback_depth: 1
