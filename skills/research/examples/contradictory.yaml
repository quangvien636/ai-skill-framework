case: "contradictory"
skill:
  id: "skill:research"
  version: "1.0.0"
input:
  topic: "Did a documentation redesign reduce support demand?"
  objective: "Summarize current evidence for the support and documentation leads."
  supplied-sources:
    - source-id: "S1"
      title: "Support ticket dashboard export"
      source-type: "internal operational data"
      date: "2026-06-30"
      provenance: "Provided by support operations"
    - source-id: "S2"
      title: "Support lead interview notes"
      source-type: "stakeholder interview"
      date: "2026-07-01"
      provenance: "Provided by documentation lead"
  evidence-notes:
    - note-id: "E1"
      source-id: "S1"
      locator: "monthly totals"
      text: "Ticket volume was unchanged in the two months after launch."
    - note-id: "E2"
      source-id: "S2"
      locator: "paragraph 4"
      text: "The support lead perceived fewer basic setup questions after launch."
expected_output_properties:
  - "both observations remain visible"
  - "the brief distinguishes total volume from setup-question composition"
  - "no reduction claim is presented as established"
  - "gaps request categorized ticket data and a longer comparison period"
expected_evaluation:
  decision: "pass"
  minimum_score: 85
